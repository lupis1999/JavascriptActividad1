<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=, initial-scale=1.0">
  <title>calculadora</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="min-h-screen bg-slate-100  flex items-center justify-center p-4">
  <div class="w-full max-w-sm bg-white rounded-3xl shadow-2xl p-5">
    <!-- Encabezado resultado -->
    <div class="mb-4">
      <h1 class="text-sm mb-2 text-slate-500">Calculadora</h1>
      <div id="display"
        class="w-full h-24 bg-slate-900 text-white rounded-2xl px-4 flex items-center justify-end text-4xl font-semibold overflow-hidden">
        0
      </div>
    </div>
    <!-- Pad numerico y operadores -->
    <div class="grid grid-cols-4 gap-3">
      <button class="btn-func bg-slate-200 hover:bg-slate-300 text-slate-800">AC</button>
      <button class="btn-func bg-slate-200 hover:bg-slate-300 text-slate-800">DEL</button>
      <button class="btn-func bg-slate-200 hover:bg-slate-300 text-slate-800">%</button>
      <button class="btn-op bg-orange-500 hover:bg-orange-600 text-white">/</button>

      <button class="btn-num">7</button>
      <button class="btn-num">8</button>
      <button class="btn-num">9</button>
      <button class="btn-op bg-orange-500 hover:bg-orange-600 text-white">x</button>

      <button class="btn-num">4</button>
      <button class="btn-num">5</button>
      <button class="btn-num">6</button>
      <button class="btn-op bg-orange-500 hover:bg-orange-600 text-white">-</button>

      <button class="btn-num">1</button>
      <button class="btn-num">2</button>
      <button class="btn-num">3</button>
      <button class="btn-op bg-orange-500 hover:bg-orange-600 text-white">+</button>

      <button class="btn-num col-span-2">0</button>
      <button class="btn-num">.</button>
      <button id="equals" class="bg-emerald-500 hover:bg-emerald-600 text-white rounded-2xl h-16 text-2xl">=</button>
    </div>
  </div>
  
  <!-- Script JS -->
  <script src="js/calculadora.js"></script>
</body>

</html>
