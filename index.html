<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo con la consola</title>
</head>
<body>

    <h1>Ejemplo de ejecucion de script JS con la consola desde un HTML</h1>
      <Script>
        let mascota = "Camila";
        console.log("Mi mascota se llama: " +  mascota);

        //input y output con prompt y console.log
        //let nombre = prompt("¿Cuál es tu nombre?");
        // console.log("Hola " + nombre + ", bienvenido a la consola de JavaScript!");
        
        //Tipos de datos
        let numero = 42; // Número
        let booleano = true; // Booleano
        let texto = "Hola, mundo!"; // Cadena de texto
        console.log("Número:", numero);
        console.log("Booleano:", booleano);
        console.log("Texto:", texto);



        let a = 10;
        let b = 5;
        //Operadores aritméticos
        var suma = a + b;
        var resta = a - b;
        var multiplicacion = a * b;
        var division = a / b ;
        console.log("Suma:", suma);
        console.log("Resta:", resta);
        console.log("Multiplicación:", multiplicacion);
        console.log("División:", division);

        //Operadores de comparación
        console.log("a es igual a b:", a == b);
        console.log("a es diferente de b:", a != b);
        console.log("a es mayor que b:", a > b);
        console.log("a es menor que b:", a < b);

        if (null) {
            console.log("a es mayor que b");
        } else if (null) {
            console.log("a es menor que b");
        } else {
            console.log("a es igual a b");
        }

    
    </Script>

</body>
</html>
